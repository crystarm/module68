name: testbench

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  shell-testbench:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Algol68G
        run: |
          sudo apt-get update
          sudo apt-get install -y algol68g

      - name: Run shell testbench
        run: |
          chmod +x tests/testbench.sh
          tests/testbench.sh
